<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo-Wolf | Fotografie</title>
  <link rel="icon" href="favicon.ico?v=1" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --text:     #e8e8e8;
      --muted:    #888;
      --accent:   #c8a96e;
      --nav-w:    240px;
      --footer-h: 56px;
      --font:     'Segoe UI', system-ui, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 16px; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .layout { display: flex; min-height: calc(100vh - var(--footer-h)); }

    nav.sidebar {
      width: var(--nav-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      position: sticky;
      top: 0;
      height: calc(100vh - var(--footer-h));
      overflow-y: auto;
      flex-shrink: 0;
    }

    nav.sidebar .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 0.25rem; }
    nav.sidebar .tagline { font-size: 0.75rem; color: var(--muted); margin-bottom: 2.5rem; letter-spacing: 0.08em; text-transform: uppercase; }

    nav.sidebar ul { list-style: none; display: flex; flex-direction: column; gap: 0.25rem; }
    nav.sidebar ul li a {
      display: block; padding: 0.55rem 0.75rem; border-radius: 6px;
      color: var(--text); font-size: 0.95rem; transition: background 0.15s, color 0.15s;
    }
    nav.sidebar ul li a:hover,
    nav.sidebar ul li a.active { background: var(--border); color: var(--accent); text-decoration: none; }
    nav.sidebar .nav-icon { margin-right: 0.6rem; opacity: 0.7; }

    main { flex: 1; overflow-y: auto; height: calc(100vh - var(--footer-h)); scroll-behavior: smooth; }

    .view { display: none; min-height: calc(100vh - var(--footer-h)); }
    .view.active { display: block; }

    .hero {
      min-height: calc(100vh - var(--footer-h));
      display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
      padding: 4rem 5rem;
      background:
        linear-gradient(to right, rgba(15,15,15,0.92) 0%, rgba(15,15,15,0.5) 60%, transparent 100%),
        url('assets/images/hero.jpg') center/cover no-repeat;
    }

    .hero-eyebrow { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .hero h1 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 700; line-height: 1.15; max-width: 640px; margin-bottom: 1.25rem; }
    .hero p { font-size: 1.15rem; color: var(--muted); max-width: 520px; margin-bottom: 2rem; }

    .hero .btn {
      display: inline-block; padding: 0.7rem 1.8rem;
      background: var(--accent); color: #0f0f0f;
      font-weight: 600; border-radius: 4px; letter-spacing: 0.04em;
      transition: opacity 0.2s; cursor: pointer; border: none; font-size: 1rem;
    }
    .hero .btn:hover { opacity: 0.85; text-decoration: none; }

    .exif-bar { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .exif-bar span { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.06em; font-family: 'Courier New', monospace; }
    .exif-bar span strong { color: var(--text); }

    .view-header { padding: 3rem 4rem 1.5rem; border-bottom: 1px solid var(--border); }
    .view-header h2 { font-size: 1.8rem; color: var(--accent); margin-bottom: 0.4rem; }
    .view-header p { color: var(--muted); font-size: 0.95rem; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      padding: 2rem 4rem 4rem;
    }

    .gallery-grid figure {
      margin: 0; border-radius: 10px; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: transform 0.2s, border-color 0.2s;
    }
    .gallery-grid figure:hover { transform: scale(1.02); border-color: var(--accent); }
    .gallery-grid figure img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .gallery-grid figcaption { padding: 8px 12px; font-size: 11px; color: var(--muted); }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 2rem 4rem 4rem;
    }

    .blog-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      cursor: pointer; transition: border-color 0.2s, transform 0.2s;
    }
    .blog-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .blog-card .card-img { width: 100%; height: 200px; object-fit: cover; display: block; background: var(--border); background-size: cover; background-position: center; }
    .blog-card .card-img-placeholder { width: 100%; height: 200px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--muted); }
    .blog-card .card-body { padding: 1.25rem; }
    .blog-card .card-date { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .blog-card .card-title { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
    .blog-card .card-excerpt { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

    /* DETAIL VIEW ARTIKEL /
    .article-container { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }
    .back-link { margin-bottom: 2rem; display: inline-block; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); cursor: pointer; }
    .back-link:hover { color: var(--accent); }
    .article-header { border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2rem; }
    .article-header h1 { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
    .article-meta { color: var(--muted); font-size: 0.85rem; }
    .article-content { line-height: 1.8; color: var(--text); }
    .article-content p { margin-bottom: 1.5rem; }
    .article-content img { max-width: 100%; border-radius: 8px; margin: 2rem 0; display: block; }
    .article-content h2, .article-content h3 { color: var(--accent); margin: 2.5rem 0 1rem; }

    .simple-section { padding: 3rem 4rem 4rem; max-width: 760px; }
    .simple-section h3 { font-size: 1.1rem; color: var(--accent); margin: 1.5rem 0 0.5rem; }
    .simple-section p { color: var(--muted); margin-bottom: 0.75rem; }
    .simple-section ul { color: var(--muted); padding-left: 1.25rem; }
    .simple-section ul li { margin-bottom: 0.4rem; }

    .impressum-section { padding: 3rem 4rem 4rem; }
    .impressum-section p { font-size: 0.88rem; color: var(--muted); line-height: 1.8; }
    .impressum-section a { color: var(--muted); }
    .impressum-section a:hover { color: var(--accent); }

    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.92);
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw; max-height: 88vh;
      border-radius: 6px; object-fit: contain;
      box-shadow: 0 8px 60px rgba(0,0,0,0.8);
    }

    .lb-close {
      position: absolute; top: 1.2rem; right: 1.5rem;
      font-size: 2rem; color: #fff; cursor: pointer; line-height: 1;
      background: none; border: none; opacity: 0.7; transition: opacity 0.15s;
    }
    .lb-close:hover { opacity: 1; }

    .lb-prev, .lb-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 2.5rem; color: #fff; cursor: pointer;
      background: none; border: none; opacity: 0.6; transition: opacity 0.15s;
      padding: 0 1.5rem; user-select: none;
    }
    .lb-prev { left: 0; }
    .lb-next { right: 0; }
    .lb-prev:hover, .lb-next:hover { opacity: 1; }

    .lb-caption {
      position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.82rem; color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace; letter-spacing: 0.06em;
    }

    footer {
      position: fixed; bottom: 0; left: 0; width: 100%; height: var(--footer-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; font-size: 0.82rem; color: var(--muted); z-index: 100;
    }
    footer .footer-links { display: flex; gap: 1.25rem; align-items: center; }
    footer .footer-links a { color: var(--muted); transition: color 0.15s; display: flex; align-items: center; gap: 0.35rem; }
    footer .footer-links a:hover { color: var(--accent); text-decoration: none; }
    .bsky-icon { width: 16px; height: 16px; fill: currentColor; }

    .hamburger {
      display: none; position: fixed; top: 1rem; left: 1rem; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.5rem 0.65rem; cursor: pointer;
      flex-direction: column; gap: 5px;
    }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      nav.sidebar { position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transform: translateX(-100%); transition: transform 0.25s ease; }
      nav.sidebar.open { transform: translateX(0); }
      .layout { flex-direction: column; }
      main { width: 100%; }
      .hero { padding: 5rem 1.5rem 3rem; }
      .view-header { padding: 2rem 1.5rem 1rem; }
      .gallery-grid { padding: 1.5rem; }
      .blog-grid { padding: 1.5rem; }
      .simple-section { padding: 2rem 1.5rem; }
      .impressum-section { padding: 2rem 1.5rem; }
      footer { padding: 0 1rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <button class="hamburger" id="hamburger" aria-label="Menü öffnen">
    <span></span><span></span><span></span>
  </button>

  <div class="layout">

    <!-- ── Sidebar ── -->
    <nav class="sidebar" id="sidebar">
      <div class="logo">Photo-Wolf</div>
      <div class="tagline">Licht · Moment · Abenteuer</div>
      <ul>
        <li><a href="#" data-view="home"        class="nav-link active"><span class="nav-icon">◈</span>Start</a></li>
        <li><a href="#" data-view="galerie"     class="nav-link"><span class="nav-icon">◧</span>Galerie</a></li>
        <li><a href="#" data-view="blog"        class="nav-link"><span class="nav-icon">✦</span>Blog</a></li>
        <li><a href="#" data-view="ausruestung" class="nav-link">

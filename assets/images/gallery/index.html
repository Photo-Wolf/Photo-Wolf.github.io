<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Galerie</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0f1115; color:#e7e7e7; }
    header { padding:24px 20px 10px; max-width:1100px; margin:0 auto; }
    h1 { margin:0 0 6px; font-size:22px; }
    p { margin:0; color:#a8b0bb; font-size:14px; }
    main { max-width:1100px; margin:0 auto; padding:18px 20px 40px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:14px; }
    figure { margin:0; border-radius:14px; overflow:hidden; background:#151923; border:1px solid rgba(255,255,255,.06); }
    a { display:block; text-decoration:none; color:inherit; }
    img { width:100%; height:220px; object-fit:cover; display:block; }
    figcaption { padding:10px 12px; font-size:12px; color:#a8b0bb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .topbar { display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .btn { display:inline-block; padding:8px 10px; border-radius:10px; background:#1a2130; border:1px solid rgba(255,255,255,.08); color:#e7e7e7; font-size:13px; }
    .btn:hover { background:#202a3d; }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Galerie</h1>
        <p>Klick auf ein Bild öffnet es groß (neuer Tab).</p>
      </div>
      <a class="btn" href="/">Start</a>
    </div>
  </header>

  <main>
    <div id="grid" class="grid"></div>
  </main>

  <script>
    // A) Bilder liegen in: /gallery/archive/
    const basePath = "/assets/images/gallery/archive/";

    // HIER Dateinamen eintragen (genau wie in GitHub, inkl. Groß-/Kleinschreibung!)
    const images = [
      "1.jpg",
      "2.jpg",
      "3.jpg",
      "4.jpg",
      "5.jpg",
      "6.jpg",
      "7.jpg",
      "8.jpg",
      "9.jpg",
    ];

    const grid = document.getElementById("grid");
    images.forEach(name => {
      const src = basePath + name;
      const fig = document.createElement("figure");
      fig.innerHTML = `
        <a href="${src}" target="_blank" rel="noopener">
          <img src="${src}" alt="">
        </a>
        <figcaption>${name}</figcaption>
      `;
      grid.appendChild(fig);
    });

    if (images.length === 0) {
      grid.innerHTML = `<p style="color:#a8b0bb">Noch keine Dateinamen eingetragen. Schick mir die Liste der Dateien, dann baue ich sie dir ein.</p>`;
    }
  </script>
</body>
</html>
